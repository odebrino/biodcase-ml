data_root: biodcase_development_set
manifest_path: data_manifest.csv
processed_root: processed_images
train_split: train
# Legacy operational alias used by older manifests. In the official BIODCASE
# semantics this split contains held-out site-year test domains, not a generic
# validation split.
val_split: validation
test_split: validation
selection_split: null
official_test_split: validation
inner_selection_split: null
selection_strategy: explicit_inner_split_required
held_out_test_domains:
  - casey2017
  - kerguelen2014
  - kerguelen2015

dataset:
  mode: spectrogram

classes:
  - bma
  - bmb
  - bmd
  - bmz
  - bp20
  - bp20plus
  - bpd

audio:
  sample_rate: 250
  margin_seconds: 1.0
  n_fft: 128
  hop_length: 16
  n_mels: 64
  f_min: 0.0
  f_max: 125.0
  frequency_scale: mel
  normalization: sample
  db_min: -80.0
  db_max: 0.0

quality:
  min_valid_seconds: 0.5

cache:
  enabled: true
  root: processed_cache
  dtype: float16
  rebuild: false
  max_gb_warning: 30

augmentation:
  time_mask: 16
  frequency_mask: 8
  noise_std: 0.015
  gain: 0.1

model:
  name: resnet18
  pretrained: false
  img_size: 224

training:
  device: cuda
  seed: 42
  batch_size: 32
  epochs: 20
  lr: 0.0001
  weight_decay: 0.0001
  num_workers: 2
  pin_memory: true
  persistent_workers: true
  mixed_precision: true
  compile_model: false
  grad_clip_norm: 2.0
  sampler: none
  loss:
    name: cross_entropy
  class_weight_multipliers: {}
  use_class_weights: true
  early_stopping_patience: 5
  output_dir: outputs/runs
  allow_official_test_for_selection: false
