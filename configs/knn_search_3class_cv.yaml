data_root: biodcase_development_set
manifest_path: data_manifest.csv
train_split: train
val_split: validation
test_split: validation
official_test_split: validation

classes:
  - ABZ
  - DDswp
  - 20Hz20Plus

label_aggregation:
  enabled: true
  name: notebook_3class_abz_ddswp_20hz20plus
  mapping:
    bma: ABZ
    bmb: ABZ
    bmz: ABZ
    bmd: DDswp
    bpd: DDswp
    bp20: 20Hz20Plus
    bp20plus: 20Hz20Plus

audio:
  preset: aplose_512_98
  margin_seconds: 1.0
  normalization: sample
  db_min: -80.0
  db_max: 0.0

quality:
  min_valid_seconds: 0.5

submission:
  feature_set: notebook_lowfreq_band_features

feature_cache:
  enabled: true
  root: outputs/cache/features

preprocessing:
  imputer: median
  scaler: robust_l2
  reducer:
    type: none

knn:
  n_neighbors: 1
  weights: uniform
  metric: cosine
  algorithm: brute
  leaf_size: 30
  p: 2
  limit_per_split: null

search:
  limit_per_class: 1000
  domain_cv_top_n: 5
  cv:
    strategy: auto
    primary: stratified_kfold
    group_column: dataset
    n_splits: 4
    max_leave_one_group_splits: 12
  notebook_ablation:
    imputer: median
    scaler: robust_l2
    reducer:
      type: none
    n_neighbors: 1
    weights: uniform
    metric: cosine
    algorithm: brute
    leaf_size: 30
    p: 2
    feature_sets:
      - notebook_lowfreq_band_features
      - notebook_lowfreq_mean_20
      - notebook_lowfreq_max_20
      - notebook_lowfreq_meanmax_64
      - relative_lowfreq_shape_features
      - temporal_lowfreq_shape_features
      - lowfreq_relative_temporal
      - lowfreq_all
      - lowfreq_all_plus_mfcc
      - lowfreq_all_plus_logmel
      - lowfreq_all_plus_waveform_spectral
  stages:
    - name: cv_focused_lowfreq
      feature_sets:
        - notebook_lowfreq_band_features
        - notebook_lowfreq_mean_20
        - notebook_lowfreq_max_20
        - notebook_lowfreq_meanmax_64
        - relative_lowfreq_shape_features
        - temporal_lowfreq_shape_features
        - lowfreq_relative_temporal
        - lowfreq_all
        - lowfreq_all_plus_mfcc
        - lowfreq_all_plus_logmel
        - lowfreq_all_plus_waveform_spectral
        - waveform_spectral_stats
        - hybrid_spectral_band16
      imputers:
        - median
        - mean
      scalers:
        - standard
        - robust
        - normalizer
        - standard_l2
        - robust_l2
        - power
      reducers:
        - type: none
        - type: variance_threshold
          threshold: 0.0
        - type: pca_components
          value: 16
        - type: pca_components
          value: 32
        - type: pca_components
          value: 64
        - type: pca_components
          value: 128
        - type: pca_components
          value: 256
      n_neighbors:
        - 1
        - 3
        - 5
        - 7
        - 9
        - 11
        - 15
        - 21
        - 31
      weights:
        - uniform
        - distance
      metrics:
        - euclidean
        - manhattan
        - cosine
      algorithms:
        - auto
        - brute
      leaf_sizes:
        - 20
        - 30
        - 50
      p_values:
        - 1
        - 2
      max_candidates: 24
      ensure_feature_coverage: true

seed: 42
