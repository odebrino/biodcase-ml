# PHASE 6 BONUS: Temporal Localization Configuration
#
# This config is for multi-event temporal detection/localization (EXPERIMENTAL).
# DO NOT use this for the main classification task.
#
# The detector uses audio-level annotations as weak labels and outputs
# temporal event boundaries.

temporal_detector:
  # Frame duration and frame rate
  frame_duration_ms: 512.0        # Duration per frame for spectrogram
  fps: 4.0                         # Frames per second (250ms per frame)
  
  # Event filtering
  min_event_duration_sec: 0.5      # Minimum duration to report as event
  confidence_threshold: 0.5        # Confidence threshold for post-processing
  
  # Classification mode
  use_multiclass: true
  classes:
    - bma
    - bmb
    - bmd
    - bmz
    - bp20
    - bp20plus
    - bpd

# Evaluation settings
evaluation:
  # IoU thresholds for matching predictions to ground truth
  iou_thresholds:
    - 0.5
    - 0.55
    - 0.6
    - 0.65
    - 0.7
    - 0.75
    - 0.8
    - 0.9
    - 0.95
  
  # Output report
  report_path: "temporal_detection_report.json"

# Data settings
data:
  # Manifest CSV (required)
  manifest_path: "data_manifest.csv"
  
  # Output directory for detection results
  output_dir: "outputs/temporal_localization"
  
  # Which splits to process (omit if all)
  splits:
    - train
    - validation

# NOTE: Actual inference requires WAV files.
# Currently, this framework demonstrates offline evaluation using manifest annotations.
# To enable real inference, provide:
# - audio_root: path to directory containing WAV files
# - preprocessing: spectrogram extraction config
# - model_checkpoint: path to trained detector model
