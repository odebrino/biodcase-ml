data_root: biodcase_development_set
manifest_path: data_manifest.csv
train_split: train
val_split: validation
test_split: validation
official_test_split: validation
held_out_test_domains:
- casey2017
- kerguelen2014
- kerguelen2015
classes:
- bma
- bmb
- bmd
- bmz
- bp20
- bp20plus
- bpd
label_aggregation:
  enabled: false
  name: notebook_3class_abz_ddswp_20hz20plus
  mapping:
    bma: ABZ
    bmb: ABZ
    bmz: ABZ
    bmd: DDswp
    bpd: DDswp
    bp20: 20Hz20Plus
    bp20plus: 20Hz20Plus
audio:
  sample_rate: 250
  n_fft: 512
  win_length: 256
  hop_length: 5
  n_mels: 256
  f_min: 0.0
  f_max: 125.0
  overlap_percent: 98
  scale: Default
  frequency_scale: linear
  crop_frequency_semantics: time_crop_with_frequency_band_mask
  preset_note: Guideline-inspired APLOSE setting nfft=512, winsize=256, overlap=98.
    This repository still uses its current mel-tensor representation; this is not
    a literal APLOSE display export.
  preset: aplose_512_98
  margin_seconds: 1.0
  normalization: sample
  db_min: -80.0
  db_max: 0.0
quality:
  min_valid_seconds: 0.5
submission:
  feature_set: lowfreq_all_plus_waveform_spectral
feature_cache:
  enabled: true
  root: outputs/cache/features
preprocessing:
  imputer: mean
  scaler: standard
  reducer:
    type: select_k_best
    k: 1024
knn:
  n_neighbors: 7
  weights: uniform
  metric: minkowski
  algorithm: brute
  leaf_size: 50
  p: 2
  limit_per_split: null
search:
  limit_per_class: 1000
  domain_cv_top_n: 5
  notebook_ablation:
    imputer: median
    scaler: robust_l2
    reducer:
      type: none
    n_neighbors: 1
    weights: uniform
    metric: cosine
    algorithm: brute
    leaf_size: 30
    p: 2
    feature_sets:
    - waveform_spectral_stats
    - handcrafted_stats
    - notebook_lowfreq_band_features
    - relative_lowfreq_shape_features
    - temporal_lowfreq_shape_features
    - lowfreq_relative_temporal
    - lowfreq_all
    - lowfreq_all_plus_mfcc
    - lowfreq_all_plus_logmel
    - lowfreq_all_plus_waveform_spectral
  cv:
    strategy: auto
    primary: domain_aware
    group_column: dataset
    n_splits: 4
    max_leave_one_group_splits: 12
  stages:
  - name: stage1_cheap_classical
    feature_sets:
    - handcrafted_stats
    - waveform_stats
    - spectral_stats
    - waveform_spectral_stats
    - notebook_lowfreq_band_features
    - relative_lowfreq_shape_features
    - temporal_lowfreq_shape_features
    - lowfreq_relative_temporal
    - lowfreq_all
    - band_energy_linear_16
    - mfcc_20
    - logmel_stats_32
    - hybrid_spectral_band16
    - lowfreq_all_plus_waveform_spectral
    imputers:
    - median
    - mean
    scalers:
    - none
    - standard
    - robust
    - normalizer
    - standard_l2
    - robust_l2
    reducers:
    - type: none
    - type: variance_threshold
      threshold: 0.0
    n_neighbors:
    - 1
    - 3
    - 5
    - 11
    - 21
    weights:
    - uniform
    - distance
    metrics:
    - euclidean
    - manhattan
    - cosine
    - chebyshev
    algorithms:
    - auto
    - brute
    leaf_sizes:
    - 20
    - 50
    p_values:
    - 1
    - 2
    - 3
    max_candidates: 14
    ensure_feature_coverage: true
    top_feature_sets: 5
  - name: stage2_deeper_classical
    feature_sets_from_previous_top: 5
    imputers:
    - median
    - mean
    scalers:
    - none
    - standard
    - robust
    - minmax
    - normalizer
    - standard_l2
    - robust_l2
    - quantile_uniform
    - power
    reducers:
    - type: none
    - type: variance_threshold
      threshold: 0.0
    - type: select_k_best
      k: 32
    - type: select_k_best
      k: 64
    - type: select_k_best
      k: 128
    - type: select_k_best
      k: 256
    - type: select_k_best
      k: 512
    - type: select_k_best
      k: 1024
    - type: pca_variance
      value: 0.9
    - type: pca_variance
      value: 0.95
    - type: pca_variance
      value: 0.98
    - type: pca_components
      value: 16
    - type: pca_components
      value: 32
    - type: pca_components
      value: 64
    - type: pca_components
      value: 128
    - type: pca_components
      value: 256
    - type: pca_components
      value: 512
    n_neighbors:
    - 1
    - 3
    - 5
    - 7
    - 9
    - 11
    - 15
    - 21
    - 31
    - 41
    - 61
    weights:
    - uniform
    - distance
    metrics:
    - euclidean
    - manhattan
    - cosine
    - chebyshev
    - minkowski
    algorithms:
    - auto
    - brute
    - ball_tree
    - kd_tree
    leaf_sizes:
    - 10
    - 20
    - 30
    - 50
    - 80
    p_values:
    - 1
    - 2
    - 3
    max_candidates: 8
diagnostics:
  n_neighbors: 5
seed: 42
search_metadata:
  best_cv_accuracy: 0.7582857142857142
  best_cv_macro_f1: 0.7582611847432232
  split_strategy:
    name: leave_one_domain_out
    strategy: LeaveOneGroupOut
    group_column: dataset
    n_splits: 3
    is_domain_aware: true
    all_scenarios:
    - name: stratified_kfold
      strategy: StratifiedKFold
      group_column: null
      n_splits: 4
      is_domain_aware: false
    - name: leave_one_domain_out
      strategy: LeaveOneGroupOut
      group_column: dataset
      n_splits: 3
      is_domain_aware: true
    random_scenario:
      name: stratified_kfold
      strategy: StratifiedKFold
      group_column: null
      n_splits: 4
      is_domain_aware: false
    domain_ranking_scenario:
      name: leave_one_domain_out
      strategy: LeaveOneGroupOut
      group_column: dataset
      n_splits: 3
      is_domain_aware: true
    final_ranking_scenario:
      name: stratified_kfold
      strategy: StratifiedKFold
      group_column: null
      n_splits: 4
      is_domain_aware: false
    ranking_mode: cv_focused_stratified_first
    note: Search uses the official training split only. The official validation split
      is excluded from CV and hyperparameter selection.
