extends: ../../../configs/baseline.yaml

dataset:
  mode: spectrogram

cache:
  enabled: true
  root: processed_cache
  dtype: float16
  rebuild: false
  max_gb_warning: 30

model:
  name: resnet18
  pretrained: false
  img_size: 224

training:
  device: cuda
  seed: 42
  batch_size: 64
  epochs: 30
  lr: 0.0001
  weight_decay: 0.0001
  num_workers: 4
  pin_memory: true
  persistent_workers: true
  mixed_precision: true
  compile_model: false
  grad_clip_norm: 2.0
  sampler: none
  loss:
    name: cross_entropy
  class_weight_multipliers: {}
  use_class_weights: true
  early_stopping_patience: 7
  output_dir: outputs/runs
