extends: ../../../configs/baseline.yaml

model:
  name: resnet18
  pretrained: false
  img_size: 224

training:
  device: cuda
  seed: 42
  batch_size: 8
  epochs: 1
  lr: 0.0001
  weight_decay: 0.0001
  num_workers: 0
  pin_memory: true
  persistent_workers: false
  mixed_precision: true
  compile_model: false
  use_class_weights: true
  early_stopping_patience: 0
  output_dir: outputs/runs
